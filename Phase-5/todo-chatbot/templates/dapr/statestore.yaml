# Dapr State Store Component — Redis-backed state store
# Demonstrates State building block; available for future session/cache use
{{- if .Values.dapr.enabled }}
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
  namespace: {{ .Release.Namespace }}
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: "{{ .Release.Name }}-redis-master.{{ .Release.Namespace }}.svc.cluster.local:6379"
    - name: redisPassword
      secretKeyRef:
        name: flowtodo-secrets
        key: redis-password
    - name: actorStateStore
      value: "false"
    - name: enableTLS
      value: "false"
{{- end }}
