openapi: "3.0.3"
info:
  title: Notifications API (spec 008)
  version: "1.0.0"
  description: In-app notification endpoints for due date reminders.

paths:
  /api/notifications:
    get:
      summary: List notifications for the current user
      description: >
        Returns notifications ordered by created_at descending.
        Frontend polls this every 30 seconds to surface new reminders.
      security:
        - bearerAuth: []
      parameters:
        - name: unread
          in: query
          description: If true, return only unread notifications
          required: false
          schema:
            type: boolean
            default: false
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  notifications:
                    type: array
                    items:
                      $ref: "#/components/schemas/NotificationRead"
                  total_count:
                    type: integer
                  unread_count:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/notifications/{notification_id}/read:
    patch:
      summary: Mark a single notification as read
      security:
        - bearerAuth: []
      parameters:
        - name: notification_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationRead"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/notifications/mark-all-read:
    post:
      summary: Mark all notifications as read for the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated_count:
                    type: integer

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    NotificationRead:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
        task_id:
          type: string
          format: uuid
          nullable: true
        message:
          type: string
          example: "Reminder: 'Buy groceries' is due in 1 hour"
        read:
          type: boolean
        created_at:
          type: string
          format: date-time

  responses:
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            type: object
            properties:
              detail:
                type: string
    NotFound:
      description: Notification not found
      content:
        application/json:
          schema:
            type: object
            properties:
              detail:
                type: string
