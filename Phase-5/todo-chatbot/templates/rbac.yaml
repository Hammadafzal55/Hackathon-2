{{- if .Values.serviceAccount.create }}
# Role to allow Dapr's Kubernetes secret store to read secrets in this namespace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "todo-chatbot.serviceAccountName" . }}-secret-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "todo-chatbot.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "todo-chatbot.serviceAccountName" . }}-secret-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "todo-chatbot.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "todo-chatbot.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: {{ include "todo-chatbot.serviceAccountName" . }}-secret-reader
{{- end }}
