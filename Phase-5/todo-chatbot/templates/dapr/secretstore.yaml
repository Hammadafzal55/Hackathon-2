# Dapr Secrets Store Component — Kubernetes-native secrets access
# Backend reads DATABASE_URL, BETTER_AUTH_SECRET, JWT_SECRET_KEY, AI_API_KEY
# via GET http://localhost:3500/v1.0/secrets/kubernetes/flowtodo-secrets
{{- if .Values.dapr.enabled }}
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: kubernetes
  namespace: {{ .Release.Namespace }}
spec:
  type: secretstores.kubernetes
  version: v1
  metadata: []
{{- end }}
