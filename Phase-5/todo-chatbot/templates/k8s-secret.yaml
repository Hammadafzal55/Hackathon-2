# Kubernetes Secret — holds all FlowTodo application secrets
# Accessed by the backend via Dapr Secrets Store (component: kubernetes)
# Secret name: flowtodo-secrets
apiVersion: v1
kind: Secret
metadata:
  name: flowtodo-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "todo-chatbot.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  BETTER_AUTH_SECRET: {{ .Values.secrets.betterAuthSecret | quote }}
  JWT_SECRET_KEY: {{ .Values.secrets.jwtSecretKey | quote }}
  AI_API_KEY: {{ .Values.secrets.aiApiKey | quote }}
  redis-password: {{ .Values.secrets.redisPassword | default "" | quote }}
